name: CI
permissions: read-all
on: [ push, pull_request ]
jobs:
  test:
    name: "Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build
        run: mvn --batch-mode install -Pdist
